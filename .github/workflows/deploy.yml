name: Build and Deploy
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - id: 'auth'
      uses: 'google-github-actions/auth@v1'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'
    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v1'
    - name: 'Docker Auth'
      run: gcloud auth configure-docker us-central1-docker.pkg.dev
    - name: 'Build & Push'
      run: |
        docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/my-app-repo/backend:latest ./backend
        docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/my-app-repo/frontend:latest ./frontend
        docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/my-app-repo/backend:latest
        docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/my-app-repo/frontend:latest
    - name: 'Deploy'
      uses: 'google-github-actions/get-gke-credentials@v1'
      with:
        cluster_name: 'my-gke-cluster'
        location: 'us-central1'
    - run: |
        sed -i "s/YOUR_PROJECT_ID/${{ secrets.GCP_PROJECT_ID }}/g" k8s/deployment.yaml
        kubectl apply -f k8s/deployment.yaml