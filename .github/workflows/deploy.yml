name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 'Checkout'
      uses: actions/checkout@v4

    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v2'

    - name: 'Docker Auth'
      run: |
        gcloud auth configure-docker us-central1-docker.pkg.dev

    - name: 'Build & Push'
      run: |
        docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/my-app-repo/backend:latest ./backend
        docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/my-app-repo/frontend:latest ./frontend
        docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/my-app-repo/backend:latest
        docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/my-app-repo/frontend:latest

    - name: 'Get GKE Credentials'
      uses: 'google-github-actions/get-gke-credentials@v2'
      with:
        cluster_name: 'my-gke-cluster'
        location: 'us-central1'

    - name: 'Deploy to K8s'
      run: |
        sed -i "s/southern-flash-485008-m6/${{ secrets.GCP_PROJECT_ID }}/g" k8s/deployment.yaml
        kubectl apply -f k8s/deployment.yaml
